server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Servir archivos estáticos normalmente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets (CSS, JS, fonts)
    location ~* \.(css|js|woff2|woff|ttf|svg|png|jpg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # No cachear HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # CORS para el webhook de n8n (opcional)
    add_header Access-Control-Allow-Origin *;

    # Logs
    access_log /var/log/nginx/helpdesk_access.log;
    error_log  /var/log/nginx/helpdesk_error.log;
}